<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuks OBS Avatar</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="avatar" class="idle">
        <div class="glow-container">
            <svg class="ai-entity" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer Rings -->
                <circle class="ring ring-outer" cx="100" cy="100" r="90" fill="none" stroke="currentColor"
                    stroke-width="2" />
                <circle class="ring ring-inner" cx="100" cy="100" r="70" fill="none" stroke="currentColor"
                    stroke-width="4" />

                <!-- Core Core -->
                <circle class="core" cx="100" cy="100" r="45" fill="currentColor" />

                <!-- Orbiting Nodes -->
                <g class="nodes">
                    <circle cx="100" cy="10" r="5" fill="#00E5FF" />
                    <circle cx="190" cy="100" r="5" fill="#7C3AED" />
                    <circle cx="100" cy="190" r="5" fill="#00E5FF" />
                    <circle cx="10" cy="100" r="5" fill="#7C3AED" />
                </g>

                <!-- Mouth/Sound Wave indicator for talking -->
                <path class="mouth" d="M 75 110 Q 100 130 125 110" fill="none" stroke="#fff" stroke-width="6"
                    stroke-linecap="round" />
            </svg>
        </div>
    </div>
    <script src="avatar.js"></script>
</body>

</html>
